<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog New 启动记录</title>
  <meta name="description" content="验证静态 HTML 博客发布链路。">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f5;
      --fg: #1d1d1f;
      --muted: #6e6e73;
      --line: #d8d8d8;
      --card: #ffffff;
      --accent: #2563eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111113;
        --fg: #f5f5f7;
        --muted: #a1a1aa;
        --line: #2f2f35;
        --card: #18181b;
        --accent: #60a5fa;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .site {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 64px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 48px;
      color: var(--muted);
      font-size: 14px;
    }

    .brand {
      color: var(--fg);
      font-weight: 700;
    }

    .hero {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    h2 {
      margin-top: 40px;
      line-height: 1.25;
    }

    h3 {
      margin-top: 28px;
      line-height: 1.3;
    }

    p {
      margin: 16px 0;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }

    pre {
      overflow: auto;
      padding: 16px;
      border-radius: 8px;
      background: #101014;
      color: #f4f4f5;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.92em;
    }

    .meta,
    .summary,
    .empty {
      color: var(--muted);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .post-list {
      display: grid;
      gap: 16px;
    }

    .post-card {
      display: block;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      color: var(--fg);
    }

    .post-card:hover {
      text-decoration: none;
      border-color: var(--accent);
    }

    .post-card h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    article {
      font-size: 18px;
    }

    blockquote {
      margin: 24px 0;
      padding-left: 18px;
      border-left: 4px solid var(--line);
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="site">
    <nav class="topbar">
      <a class="brand" href="/">Blog</a>
      <a href="/">Home</a>
    </nav>
    <article>
      <header class="hero">
        <div class="meta">2026-07-02</div>
        <h1>Blog New 启动记录</h1>
        <p class="summary">验证静态 HTML 博客发布链路。</p>
        <div class="tags"><span class="tag">Blog</span><span class="tag">Static</span><span class="tag">AI</span></div>
      </header>
      <h2>这是第一篇静态文章</h2><p>这个页面由脚本生成，可以直接上传到服务器静态目录，由 Nginx 托管。</p><h2>发布链路</h2><p>AI 生成 HTML 内容后，调用脚本写入文章页、更新索引、生成首页，然后通过 rsync 上传。</p>
    </article>
  </main>
</body>
</html>
